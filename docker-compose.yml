version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: senco_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: senco_weekly_planner
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d senco_weekly_planner"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: senco_backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/senco_weekly_planner"
      PORT: 3001
      JWT_SECRET: "senco-dev-jwt-secret-key-2026"
      JWT_REFRESH_SECRET: "senco-dev-jwt-refresh-secret-key-2026"
      JWT_EXPIRATION: "15m"
      JWT_REFRESH_EXPIRATION: "7d"
      FRONTEND_URL: "http://localhost:3000"
      # AI (Optional)
      # GEMINI_API_KEY: "your-api-key-here"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push && 
             npx prisma db seed &&
             npm run start:prod"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: senco_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001"
    depends_on:
      - backend

volumes:
  postgres_data:
